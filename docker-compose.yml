version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskly-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: taskly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskly-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: "postgresql://postgres:password123@postgres:5432/taskly_db?sslmode=disable"
      JWT_SECRET: "docker-local-secret-key-change-in-production"
      NODE_ENV: production
      FRONTEND_URL: "http://localhost:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
